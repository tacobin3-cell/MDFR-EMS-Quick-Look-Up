<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Medications Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            border-bottom: 1px solid #475569;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 24px 16px;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .header-icon {
            padding: 12px;
            background: linear-gradient(to bottom right, #10b981, #059669);
            border-radius: 8px;
        }

        .header-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .header-title h1 {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        .header-title p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 640px) {
            .controls {
                flex-direction: row;
            }
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .search-box input:focus {
            outline: none;
            ring: 2px;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1), inset 0 0 0 1px #10b981;
            border-color: transparent;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 10px;
            width: 20px;
            height: 20px;
            color: #64748b;
        }

        .rank-select {
            padding: 10px 16px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .rank-select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1), inset 0 0 0 1px #10b981;
            border-color: transparent;
        }

        .rank-select option {
            background: #1e293b;
            color: white;
        }

        /* Results Count */
        .results-count {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 16px;
            font-size: 14px;
            color: #64748b;
        }

        /* Medications */
        .medications {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px 48px;
            display: grid;
            gap: 12px;
        }

        .med-card {
            background: linear-gradient(to right, rgba(30, 41, 59, 0.4), rgba(30, 41, 59, 0.2));
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .med-card:hover {
            border-color: rgba(16, 185, 129, 0.5);
            background: linear-gradient(to right, rgba(30, 41, 59, 0.6), rgba(30, 41, 59, 0.4));
        }

        .med-button {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 20px;
            cursor: pointer;
            color: inherit;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .med-info {
            flex: 1;
            min-width: 0;
        }

        .med-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .med-name {
            font-size: 18px;
            font-weight: bold;
            color: white;
            transition: color 0.3s;
        }

        .med-card:hover .med-name {
            color: #10b981;
        }

        .med-category {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(71, 85, 105, 0.5);
            font-size: 12px;
            font-weight: 500;
            color: #cbd5e1;
            border-radius: 4px;
        }

        .med-indication {
            font-size: 14px;
            color: #cbd5e1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 12px;
        }

        .med-ranks {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .rank-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .rank-emtb {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .rank-aemt {
            background: rgba(217, 119, 6, 0.2);
            color: #fbbf24;
        }

        .rank-paramedic {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .chevron {
            width: 20px;
            height: 20px;
            color: #94a3b8;
            transition: transform 0.3s;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .chevron.rotated {
            transform: rotate(180deg);
        }

        /* Expanded Details */
        .med-details {
            background: rgba(15, 23, 42, 0.3);
            border-top: 1px solid rgba(16, 185, 129, 0.3);
            padding: 24px;
            display: grid;
            gap: 24px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .med-details {
                grid-template-columns: 1fr 1fr;
            }
        }

        .detail-section h3 {
            font-size: 12px;
            font-weight: bold;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .dosage-item {
            background: rgba(15, 23, 42, 0.3);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(71, 85, 105, 0.3);
            margin-bottom: 8px;
        }

        .dosage-type {
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 4px;
        }

        .dosage-value {
            font-size: 14px;
            color: #e2e8f0;
        }

        .route-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .route-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .timing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .timing-box {
            background: rgba(15, 23, 42, 0.3);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(71, 85, 105, 0.3);
        }

        .timing-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .timing-value {
            font-size: 13px;
            color: #e2e8f0;
        }

        .info-box {
            background: rgba(15, 23, 42, 0.3);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(71, 85, 105, 0.3);
            font-size: 13px;
            color: #e2e8f0;
            line-height: 1.5;
        }

        .warning-section h3 {
            color: #fbbf24 !important;
        }

        .warning-section .info-box {
            border-color: rgba(217, 119, 6, 0.2);
        }

        .danger-section h3 {
            color: #fca5a5 !important;
        }

        .danger-section .info-box {
            border-color: rgba(239, 68, 68, 0.2);
        }

        .notes-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #475569;
            grid-column: 1 / -1;
        }

        .notes-section h3 {
            font-size: 12px !important;
            margin-bottom: 8px;
        }

        .notes-text {
            font-size: 13px;
            color: #cbd5e1;
            font-style: italic;
            line-height: 1.6;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px 16px;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            color: #475569;
            margin: 0 auto 16px;
        }

        .empty-text {
            color: #64748b;
            font-size: 18px;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #475569;
            background: rgba(15, 23, 42, 0.4);
            margin-top: 48px;
        }

        .footer-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 16px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }

        .footer-content p:not(:last-child) {
            margin-bottom: 8px;
        }

        /* Icons */
        .icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: -0.125em;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.2s ease-in;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="header-top">
                    <div class="header-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline>
                        </svg>
                    </div>
                    <div class="header-title">
                        <h1>EMS Medications Portal</h1>
                        <p>Comprehensive quick-reference guide for emergency medications</p>
                    </div>
                </div>
                <div class="controls">
                    <div class="search-box">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search medications, indications, or categories..." onkeyup="filterMedications()">
                    </div>
                    <select id="rankFilter" class="rank-select" onchange="filterMedications()">
                        <option value="all">All EMS Levels</option>
                        <option value="EMT-B">EMT-Basic</option>
                        <option value="AEMT">AEMT</option>
                        <option value="Paramedic">Paramedic</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Results Count -->
        <div class="results-count">
            Showing <span id="resultsCount">0</span> of <span id="totalCount">0</span> medications
        </div>

        <!-- Medications List -->
        <div class="medications" id="medicationsList"></div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-content">
                <p>This is a reference guide. Always follow your local EMS protocols and medical director guidance.</p>
                <p>Last updated: March 2026</p>
            </div>
        </div>
    </div>

    <script>
        const medications = [
    {

      ranks: ['EMT-B', 'AEMT', 'Paramedic'],

      },

      indication: 'Symptomatic bradycardia, organophosphate/carbamate poisoning',

      duration: '1-3 hours',
      notes: 'Do not give for bradycardia if blood pressure is adequate. Slower rate may be normal in athletes.'
    },
    {
      name: 'Amiodarone',
      category: 'Antiarrhythmic',
      ranks: ['Paramedic'],
      dosages: {
        'VF/VT (First dose)': '300 mg IV/IO',

      },
      routes: ['IV', 'IO'],
      indication: 'Ventricular fibrillation, pulseless VT, stable wide-complex tachycardia',

      routes: ['Sublingual', 'IV (Paramedic only)'],

      onset: '1-3 minutes (SL), immediate (IV)',
      duration: '30 minutes (SL), 5-10 minutes (IV)',
      notes: 'Patient should sit when taking SL. Always check for RV involvement in inferior MI before giving. Contact ALS for IV.'
    },
    {
      name: 'Morphine',
      category: 'Opioid Analgesic',
      ranks: ['Paramedic'],
      dosages: {
        'Acute Pain/Dyspnea (Adult)': '2-4 mg IV/IM, repeat every 5 minutes as needed',
        'Acute MI': '4-8 mg IV, repeat every 5-15 minutes',
        'Pediatric': '0.1 mg/kg IV'
      },
      routes: ['IV', 'IM', 'IO'],
      indication: 'Severe pain, acute MI, pulmonary edema, acute dyspnea',
      contraindications: 'Respiratory depression, hypotension, head injury, drug allergy',
      sideEffects: 'Respiratory depression, hypotension, bradycardia, nausea, constipation',

      },

        'MDI': '1-2 puffs every 5-15 minutes'

    {

    },
    {
      name: 'Furosemide (Lasix)',
      category: 'Loop Diuretic',
      ranks: ['Paramedic'],
      dosages: {

      },
      routes: ['IV', 'IO'],

        function filterMedications() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const rankFilter = document.getElementById('rankFilter').value;
            
            const filtered = medications.filter(med => {
                const matchesSearch = med.name.toLowerCase().includes(searchTerm) ||
                                    med.indication.toLowerCase().includes(searchTerm) ||
                                    med.category.toLowerCase().includes(searchTerm);
                
                const matchesRank = rankFilter === 'all' || med.ranks.includes(rankFilter);
                return matchesSearch && matchesRank;
            });

            document.getElementById('resultsCount').textContent = filtered.length;
            document.getElementById('totalCount').textContent = medications.length;
            renderMedications(filtered);
        }

        function renderMedications(meds) {
            const container = document.getElementById('medicationsList');
            
            if (meds.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <p class="empty-text">No medications found matching your search.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = meds.map((med, idx) => `
                <div class="med-card">
                    <button class="med-button" onclick="toggleDetails(${idx})">
                        <div class="med-info">
                            <div class="med-header">
                                <h2 class="med-name">${med.name}</h2>
                                <span class="med-category">${med.category}</span>
                            </div>
                            <p class="med-indication">${med.indication}</p>
                            <div class="med-ranks">
                                ${med.ranks.map(rank => {
                                    const rankClass = rank === 'EMT-B' ? 'rank-emtb' : 
                                                    rank === 'AEMT' ? 'rank-aemt' : 'rank-paramedic';
                                    return `<span class="rank-badge ${rankClass}">${rank}</span>`;
                                }).join('')}
                            </div>
                        </div>
                        <svg class="chevron ${window.expandedMedIndex === idx ? 'rotated' : ''}" 
                             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    ${window.expandedMedIndex === idx ? `
                        <div class="med-details fade-in">
                            <div>
                                <h3>Dosages</h3>
                                ${Object.entries(med.dosages).map(([type, dose]) => `
                                    <div class="dosage-item">
                                        <p class="dosage-type">${type}</p>
                                        <p class="dosage-value">${dose}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <div>
                                <h3>Routes</h3>
                                <div class="route-badges">
                                    ${med.routes.map(route => `<span class="route-badge">${route}</span>`).join('')}
                                </div>
                                <div class="timing-grid" style="margin-top: 16px;">
                                    <div class="timing-box">
                                        <p class="timing-label">Onset</p>
                                        <p class="timing-value">${med.onset}</p>
                                    </div>
                                    <div class="timing-box">
                                        <p class="timing-label">Duration</p>
                                        <p class="timing-value">${med.duration}</p>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h3>Indication</h3>
                                <div class="info-box">${med.indication}</div>
                            </div>
                            <div class="warning-section">
                                <h3>Contraindications</h3>
                                <div class="info-box">${med.contraindications}</div>
                            </div>
                            <div class="danger-section">
                                <h3>Side Effects</h3>
                                <div class="info-box">${med.sideEffects}</div>
                            </div>
                            ${med.notes ? `
                                <div class="notes-section">
                                    <h3>Clinical Notes</h3>
                                    <p class="notes-text">${med.notes}</p>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function toggleDetails(idx) {
            if (window.expandedMedIndex === idx) {
                window.expandedMedIndex = null;
            } else {
                window.expandedMedIndex = idx;
            }
            filterMedications();
        }

        // Initial render
        window.expandedMedIndex = null;
        filterMedications();
    </script>
